[supervisord]
nodaemon=true
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid

[program:backend]
directory=/app/backend
command=uvicorn app:app --host 0.0.0.0 --port 8000
autostart=true
autorestart=true
stderr_logfile=/var/log/backend.err.log
stdout_logfile=/var/log/backend.out.log
environment=PYTHONUNBUFFERED=1,APP_ENV=production,USE_AWS=false,FALLBACK_ENABLED=true

[program:frontend]
directory=/app/frontend
command=streamlit run dashboard.py --server.address=0.0.0.0 --server.port=8501 --server.headless=true
autostart=true
autorestart=true
stderr_logfile=/var/log/frontend.err.log
stdout_logfile=/var/log/frontend.out.log
environment=PYTHONUNBUFFERED=1,BACKEND_URL=http://localhost:8000
